include ./theme.conf

font_family         Hack Nerd Font Mono
bold_font           auto
italic_font         auto
bold_italic_font    auto
font_size           10
cursor              none
cursor_shape        underline
cursor_underline_thickness  2.0
copy_on_select      yes
mouse_hide_wait     1.0
window_padding_width 1.0
shell_integration   no-cursor
background_opacity  1.0
